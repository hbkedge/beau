<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAUTIFY | 管理後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 20px; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--surface); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text); font-size: 14px; }
        th { background: rgba(255,255,255,0.05); color: var(--primary); font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        select { background: #1A1A1A; color: var(--text); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 12px; font-family: inherit; font-size: 13px; outline: none; }
        select:focus { border-color: var(--primary); }
        
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 1; transition: opacity 0.5s; }
        .hidden { display: none !important; }
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div style="text-align: center;">
            <h1 style="margin-bottom: 10px;">BEAUTIFY</h1>
            <p style="color: var(--text-muted);">正在加載管理數據...</p>
        </div>
    </div>

    <div class="admin-container">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
            <div>
                <h1>ADMIN | 後台管理</h1>
                <p class="subtitle">營收概括與訂單管理系統</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" onclick="loadData()" style="width: auto; padding: 12px 24px; margin: 0;">重新整理</button>
                <button class="btn-primary" onclick="location.href='index.html'" style="width: auto; padding: 12px 24px; margin: 0; background: #333; color: white;">返回前台</button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">總營收</div>
                <div class="stat-value" id="totalIncome">NT$ 0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">總訂單數</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">設計師業績</div>
                <div id="designer-stats" style="margin-top: 10px; font-size: 12px; line-height: 1.8;">
                    載入中...
                </div>
            </div>
        </div>

        <!-- Booking List -->
        <section class="card" style="padding: 10px;">
            <div class="section-title" style="padding: 15px 15px 0 15px;">所有預約訂單</div>
            <div style="overflow-x: auto;">
                <table id="bookingTable">
                    <thead>
                        <tr>
                            <th>單號</th>
                            <th>顧客</th>
                            <th>設計師</th>
                            <th>服務項目</th>
                            <th>日期時間</th>
                            <th>金額</th>
                            <th>狀態管理</th>
                        </tr>
                    </thead>
                    <tbody id="booking-list">
                        <!-- Data rows here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="admin.js"></script>
</body>
</html>
